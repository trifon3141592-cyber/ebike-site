<script>
(function() {
    const VK_TOKEN = 'vk1.a.hHzVmJEjN2Kye_AduICuyP80liV9GWDzXTFOK5MQ0Y4KhQBtheN9vrtfKYI-Wq5HV8eIKjDUGzJmnfWXlT2Lz49XxpxCscZpiGUl9auijocUAdMuOLIv9NBPk3RBBsUWRFp4L1u86hEjZVoviCoUOpPrtU5Nkw7s_t5don2rW_YUnOycufbD3xQkXhi0Tt1TGzsmltrDINoF556pSzsW-g';
    const YOUR_VK_ID = 40815578;
    let lastMsgId = 0;

    let visitorId = localStorage.getItem('ebike_chat_id');
    if (!visitorId) {
        visitorId = 'visitor_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('ebike_chat_id', visitorId);
    }

    const chatBody = document.getElementById('chatBody');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    userInput.focus();

    // Отправка сообщения клиента
    function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        userInput.value = '';

        const vkText = '📩 ' + visitorId + '\n' + text;
        const url = 'https://api.vk.com/method/messages.send'
            + '?user_id=' + YOUR_VK_ID
            + '&message=' + encodeURIComponent(vkText)
            + '&random_id=' + Math.floor(Math.random() * 100000000)
            + '&access_token=' + VK_TOKEN
            + '&v=5.199';

        new Image().src = url;
        scrollDown();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // Проверка ответов из ВК (каждые 5 секунд)
    function checkReplies() {
        const url = 'https://api.vk.com/method/messages.getHistory'
            + '?user_id=' + YOUR_VK_ID
            + '&count=5'
            + '&access_token=' + VK_TOKEN
            + '&v=5.199';

        const script = document.createElement('script');
        const cbName = 'vkCb_' + Date.now();
        window[cbName] = function(data) {
            if (data.response && data.response.items) {
                const items = data.response.items;
                for (let i = 0; i < items.length; i++) {
                    const msg = items[i];
                    // Только входящие (out=0) и новее lastMsgId
                    if (msg.out === 0 && msg.id > lastMsgId) {
                        lastMsgId = msg.id;
                        // Извлекаем ответ менеджера
                        const text = msg.text;
                        // Проверяем, что это ответ на заявку (содержит visitorId)
                        if (text.indexOf(visitorId) !== -1) {
                            const reply = text.split('\n').slice(1).join('\n');
                            addMessage('manager', reply);
                        }
                    }
                }
            }
            delete window[cbName];
        };

        script.src = url + '&callback=' + cbName;
        document.body.appendChild(script);
        script.onload = function() { document.body.removeChild(script); };
    }

    setInterval(checkReplies, 5000);

    function addMessage(who, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + who;
        const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = text + '<span class="time">' + time + '</span>';
        chatBody.appendChild(div);
        scrollDown();
    }

    function scrollDown() {
        chatBody.scrollTop = chatBody.scrollHeight;
    }
})();
</script>
